services:
  - type: web
    name: sas-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: CORS_ALLOW_ORIGINS
        value: https://sas-web.onrender.com,http://localhost:5173
      - key: STORAGE_BUCKET
        value: sas-uploads
      # Segredos — preencher no dashboard do Render após o primeiro deploy
      # (Settings > Environment), nunca commitados aqui.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CANVAS_BASE_URL
        sync: false
      - key: CANVAS_API_TOKEN
        sync: false
      - key: SCHEDULER_SECRET
        sync: false
      # Exigidos quando APP_ENV != dev/test (guard de boot em app/main.py):
      - key: JWT_SECRET_KEY
        sync: false
      - key: COORDENADOR_SENHA
        sync: false

  # Frontend estático (grátis no Render). O http-client.js detecta o host e
  # aponta pra sas-api automaticamente quando não está em localhost.
  - type: web
    name: sas-web
    runtime: static
    rootDir: web
    buildCommand: ""
    staticPublishPath: .

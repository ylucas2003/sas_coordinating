services:
  - type: web
    name: sas-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: CORS_ALLOW_ORIGINS
        value: https://sas.vercel.app
      - key: STORAGE_BUCKET
        value: sas-uploads
      # Segredos — preencher no dashboard do Render após o primeiro deploy
      # (Settings > Environment), nunca commitados aqui.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CANVAS_BASE_URL
        sync: false
      - key: CANVAS_API_TOKEN
        sync: false
